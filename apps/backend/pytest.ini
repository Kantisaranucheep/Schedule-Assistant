[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    asyncio: mark test as async
    slow: mark test as slow running
    integration: mark test as integration test

[coverage:run]
source = app
omit = 
    app/__init__.py
    app/*/migrations/*
    tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
